[package]
name        = "entropy"
version     = "0.1.0"
edition     = "2021"
description = "A pure-Rust statistical test suite for pseudorandom number generators (NIST SP 800-22, DIEHARD, DIEHARDER)"
license     = "MIT"

[[bin]]
name = "run_tests"
path = "src/main.rs"

[lib]
name = "entropy"
path = "src/lib.rs"

# No external dependencies — pure, safe Rust throughout.
[dependencies]
